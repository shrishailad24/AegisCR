# AegisCR - Render Free Tier Deployment Configuration
services:
  - type: web
    name: aegiscr-backend
    env: python
    region: singapore
    plan: free
    buildCommand: "pip install --no-cache-dir -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1 --limit-max-requests 1000"
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MALLOC_TRIM_THRESHOLD_
        value: "65536"
      - key: ENVIRONMENT
        value: "production"
